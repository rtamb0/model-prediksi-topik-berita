name: Deploy Prediksi Berita

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/prediksi-berita-web
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/prediksi-berita-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=api

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Sync docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/prediksi-berita/

      - name: Sync nginx.conf to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: nginx/nginx.conf
          target: /opt/prediksi-berita/nginx/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            trap 'echo "Deployment failed, showing docker-compose logs:"; docker-compose logs --no-color --tail=200 || true' ERR
            cd /opt/prediksi-berita
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            docker-compose down --remove-orphans || true
            docker-compose pull
            docker-compose up -d --remove-orphans

            for i in {1..30}; do
              if curl -fsS http://localhost/nlp/prediksi-berita/api/docs > /dev/null; then
                echo "API is ready"
                break
              fi
              echo "Waiting for API... ($i/30)"
              sleep 2
            done

            curl -fsS -X POST http://localhost/nlp/prediksi-berita/api/predict \
              -H "Content-Type: application/json" \
              -d '{"text":"Presiden menghadiri rapat kabinet di istana negara"}'

            docker image prune -f
