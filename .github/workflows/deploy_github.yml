name: Deploy Prediksi Berita (GHCR Build Only)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/prediksi-berita-web
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/prediksi-berita-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download model
        run: |
          mkdir -p model-data
          curl -L \
            https://huggingface.co/rtamb0/indonesian-news-category-predict-indobert/resolve/main/model.safetensors \
            -o model-data/model.safetensors

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: VITE_API_BASE_URL=/api
          
      - name: Run API container
        run: |
          docker run -d \
          --name api \
          -p 8000:8000 \
          -v ${{ github.workspace }}/model-data:/app/model \
          ${{ env.API_IMAGE }}:latest

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/docs > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API did not become ready in time"
          docker logs api || true
          exit 1

      - name: Test API
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d '{"text":"Berita ekonomi Indonesia"}' \
            http://localhost:8000/predict

      - name: Check container status
        run: |
          docker ps -a

      - name: Show API logs
        if: always()
        run: |
          docker logs api